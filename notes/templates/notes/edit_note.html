{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">

    <div class="d-flex align-items-center mb-3 animate-fade-in-up">
      <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold">
        <i class="bi bi-pencil-square me-2" style="color: var(--accent-blue);"></i>
        <span class="section-title">Edit Note</span>
      </h5>
    </div>

    <div class="form-card p-4 animate-fade-in-up delay-2">
      <form method="POST" action="{% url 'edit_note' note.pk %}">
        {% csrf_token %}

        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text"
                 id="title"
                 name="title"
                 class="form-control"
                 value="{{ note.title }}"
                 required>
        </div>

        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea id="content"
                    name="content"
                    rows="7"
                    class="form-control"
                    required>{{ note.content }}</textarea>
        </div>

        <div class="d-flex gap-2">
          <a href="{% url 'home' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
          <button type="submit" class="btn btn-success flex-fill">
            <i class="bi bi-check2 me-1"></i>Update Note
          </button>
        </div>

      </form>
    </div>

    <p class="small mt-3 text-center animate-fade-in-up delay-4">
      <i class="bi bi-clock me-1" style="color: var(--accent-blue);"></i>
      Created: {{ note.created_at|date:"M d, Y H:i" }}
    </p>

  </div>
</div>

{% endblock %}
