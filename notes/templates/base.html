{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NoteApp{% endblock %} | NoteApp</title>
    <meta name="description" content="NoteApp — A stunning, modern notes manager built with Django. Create, edit, search and organize your notes beautifully.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ===== CSS Custom Properties — Soft Premium Palette ===== */
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161822;
            --bg-card: rgba(22, 24, 38, 0.75);
            --bg-glass: rgba(255, 255, 255, 0.02);
            --border-glass: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #e2e4eb;
            --text-secondary: #9498a8;
            --text-muted: #5c6070;
            --accent-blue: #6366f1;
            --accent-violet: #8b5cf6;
            --accent-teal: #2dd4bf;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-rose: #f472b6;
            --glow-blue: 0 0 15px rgba(99, 102, 241, 0.15);
            --glow-violet: 0 0 15px rgba(139, 92, 246, 0.15);
            --glow-teal: 0 0 15px rgba(45, 212, 191, 0.15);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition-smooth: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-bounce: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== Global ===== */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Subtle Ambient Background ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 15% 50%, rgba(99, 102, 241, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(139, 92, 246, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 85%, rgba(45, 212, 191, 0.025) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Ambient Orbs — very soft */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb-1 {
            width: 450px; height: 450px;
            background: rgba(99, 102, 241, 0.06);
            top: -120px; left: -120px;
            animation: orbFloat1 20s ease-in-out infinite;
        }

        .bg-orb-2 {
            width: 400px; height: 400px;
            background: rgba(139, 92, 246, 0.05);
            bottom: -80px; right: -100px;
            animation: orbFloat2 24s ease-in-out infinite;
        }

        .bg-orb-3 {
            width: 350px; height: 350px;
            background: rgba(45, 212, 191, 0.035);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat3 28s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.08); }
            66% { transform: translate(-40px, 100px) scale(0.92); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, -50px) scale(1.1); }
            66% { transform: translate(50px, -80px) scale(0.9); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-35%, -55%) scale(1.15); }
        }

        /* ===== Main Content ===== */
        main {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .container { position: relative; z-index: 1; }

        /* ===== Glass Card Base ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.06),
                transparent);
        }

        /* ===== 3D Note Card ===== */
        .note-card-3d {
            perspective: 1000px;
            cursor: default;
        }

        .note-card-inner {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.5s ease,
                        border-color 0.35s ease;
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .note-card-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(99, 102, 241, 0.15),
                transparent);
        }

        .note-card-inner::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(
                circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(99, 102, 241, 0.04) 0%,
                transparent 50%
            );
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .note-card-3d:hover .note-card-inner::after {
            opacity: 1;
        }

        .note-card-3d:hover .note-card-inner {
            transform: translateY(-6px) rotateX(2deg) rotateY(-1.5deg);
            box-shadow:
                0 16px 32px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.15);
        }

        .note-card-inner .card-body { position: relative; z-index: 1; }

        .note-card-inner .card-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .note-card-inner .card-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .note-card-inner .card-footer {
            background: transparent !important;
            border-top: 1px solid var(--border-glass) !important;
            position: relative;
            z-index: 1;
        }

        /* ===== Animations ===== */
        @keyframes fadeInUp3D {
            from { opacity: 0; transform: translateY(30px) rotateX(-6deg) scale(0.97); }
            to { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px) scale(0.97); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes subtleGlow {
            0%, 100% { box-shadow: 0 0 4px rgba(99, 102, 241, 0.1); }
            50% { box-shadow: 0 0 12px rgba(99, 102, 241, 0.18); }
        }

        @keyframes softTextGlow {
            0%, 100% { text-shadow: 0 0 8px rgba(99, 102, 241, 0.25); }
            50% { text-shadow: 0 0 16px rgba(99, 102, 241, 0.4); }
        }

        @keyframes floatBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(1.5deg); }
            75% { transform: translateY(-4px) rotate(-1deg); }
        }

        @keyframes borderShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideInAlert {
            from { opacity: 0; transform: translateY(-16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes gentleSpin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.4); }
            50% { opacity: 1; transform: scale(1.03); }
            70% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }

        .animate-fade-in-up { animation: fadeInUp3D 0.6s ease-out both; }
        .animate-slide-in-left { animation: slideInLeft 0.6s ease-out both; }
        .animate-fade-in-scale { animation: fadeInScale 0.5s ease-out both; }
        .animate-bounce-in { animation: bounceIn 0.6s ease-out both; }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        .delay-7 { animation-delay: 0.7s; }
        .delay-8 { animation-delay: 0.8s; }

        /* ===== Form Styling ===== */
        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(99, 102, 241, 0.12),
                transparent);
        }

        .form-card:hover,
        .form-card:focus-within {
            border-color: rgba(99, 102, 241, 0.18);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2), var(--glow-blue);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-family: var(--font-main);
            transition: var(--transition-smooth);
        }

        .form-control::placeholder { color: var(--text-muted); }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(99, 102, 241, 0.35);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
            color: var(--text-primary);
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ===== Buttons ===== */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            border: none;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before { left: 100%; }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.25);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
        }

        .btn-outline-primary {
            color: var(--accent-blue);
            border-color: rgba(99, 102, 241, 0.2);
            background: transparent;
            border-radius: 8px;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .btn-outline-primary:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.35);
            color: var(--accent-blue);
            box-shadow: var(--glow-blue);
            transform: translateY(-1px);
        }

        .btn-outline-danger {
            color: #ef6868;
            border-color: rgba(239, 104, 104, 0.2);
            background: transparent;
            border-radius: 8px;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .btn-outline-danger:hover {
            background: rgba(239, 104, 104, 0.08);
            border-color: rgba(239, 104, 104, 0.3);
            color: #ef6868;
            box-shadow: 0 0 12px rgba(239, 104, 104, 0.12);
            transform: translateY(-1px);
        }

        .btn-outline-secondary {
            color: var(--text-secondary);
            border-color: var(--border-glass);
            background: transparent;
            border-radius: 8px;
            transition: var(--transition-smooth);
        }

        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef6868, #dc4040);
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-danger:hover {
            box-shadow: 0 4px 16px rgba(239, 104, 104, 0.2);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent-teal), #0d9488);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .btn-success:hover {
            box-shadow: 0 4px 16px rgba(45, 212, 191, 0.2);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            border-radius: 8px;
            transition: var(--transition-smooth);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        /* ===== Navbar ===== */
        .navbar-glass {
            background: rgba(15, 17, 23, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0.8rem 0;
            z-index: 1000;
        }

        .navbar-glass .navbar-brand {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: softTextGlow 4s ease-in-out infinite;
        }

        .navbar-glass .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .navbar-glass .nav-link:hover,
        .navbar-glass .nav-link.active {
            color: var(--accent-blue) !important;
            background: rgba(99, 102, 241, 0.06);
        }

        .navbar-glass .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%; transform: translateX(-50%);
            width: 18px; height: 2px;
            background: var(--accent-blue);
            border-radius: 1px;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.4);
        }

        /* Navbar search */
        .search-glass .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            border-radius: 10px 0 0 10px;
            font-size: 0.85rem;
        }

        .search-glass .form-control:focus {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .search-glass .btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            border: none;
            border-radius: 0 10px 10px 0;
            color: #fff;
            transition: var(--transition-smooth);
        }

        .search-glass .btn:hover {
            box-shadow: var(--glow-blue);
        }

        /* Dropdown glass */
        .dropdown-menu-glass {
            background: rgba(22, 24, 38, 0.96) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 0.5rem;
        }

        .dropdown-menu-glass .dropdown-item {
            color: var(--text-secondary);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: var(--transition-smooth);
        }

        .dropdown-menu-glass .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.06);
            color: var(--accent-blue);
        }

        .dropdown-menu-glass .dropdown-divider {
            border-color: var(--border-glass);
        }

        /* ===== Footer ===== */
        .footer-glass {
            background: rgba(15, 17, 23, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border-glass);
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        .footer-glass::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(99, 102, 241, 0.2),
                rgba(139, 92, 246, 0.15),
                transparent);
        }

        .footer-heading {
            color: var(--text-primary);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .footer-links {
            list-style: none;
            padding: 0; margin: 0;
        }

        .footer-links li { margin-bottom: 0.5rem; }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-smooth);
            font-size: 0.88rem;
        }

        .footer-links a:hover {
            color: var(--accent-blue);
            padding-left: 4px;
        }

        .social-icon-3d {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            font-size: 1.05rem;
            text-decoration: none;
            transition: var(--transition-bounce);
            margin-right: 0.5rem;
        }

        .social-icon-3d:hover {
            transform: translateY(-3px) rotateY(10deg);
            border-color: rgba(99, 102, 241, 0.25);
            color: var(--accent-blue);
            box-shadow: var(--glow-blue);
            background: rgba(99, 102, 241, 0.04);
        }

        /* ===== Alerts ===== */
        .alert-glass {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 12px;
            animation: slideInAlert 0.4s ease-out;
        }

        .alert-glass.alert-success {
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: var(--accent-green);
        }

        .alert-glass.alert-error,
        .alert-glass.alert-danger {
            border: 1px solid rgba(239, 104, 104, 0.2);
            color: #ef6868;
        }

        .alert-glass.alert-info {
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--accent-blue);
        }

        .alert-glass.alert-warning {
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: var(--accent-amber);
        }

        .alert-glass .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.25;
            animation: floatBounce 3.5s ease-in-out infinite;
            display: inline-block;
            color: var(--text-muted);
        }

        .empty-state p { color: var(--text-secondary); }

        /* ===== Modal ===== */
        .modal-content-glass {
            background: rgba(22, 24, 38, 0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            color: var(--text-primary);
            animation: fadeInScale 0.25s ease-out;
        }

        .modal-content-glass .modal-header { border-bottom: 1px solid var(--border-glass); }
        .modal-content-glass .modal-footer { border-top: 1px solid var(--border-glass); }
        .modal-content-glass .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        /* ===== Badges ===== */
        .badge-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
        }

        .badge-neon {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .badge-neon.bg-dark {
            background: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
        }

        .badge-neon.bg-primary {
            background: rgba(99, 102, 241, 0.08) !important;
            border: 1px solid rgba(99, 102, 241, 0.15);
            color: var(--accent-blue) !important;
        }

        .badge-neon.bg-secondary {
            background: rgba(139, 92, 246, 0.08) !important;
            border: 1px solid rgba(139, 92, 246, 0.15);
            color: var(--accent-violet) !important;
        }

        .badge-neon.bg-success {
            background: rgba(45, 212, 191, 0.08) !important;
            border: 1px solid rgba(45, 212, 191, 0.15);
            color: var(--accent-teal) !important;
        }

        /* ===== Card & Accordion ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
        }

        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-glass) !important;
            color: var(--text-primary);
        }

        .accordion-button {
            background: transparent;
            color: var(--text-primary) !important;
            font-weight: 600;
        }

        .accordion-button:not(.collapsed) {
            background: rgba(99, 102, 241, 0.04);
            color: var(--accent-blue) !important;
            box-shadow: none;
        }

        .accordion-button::after {
            filter: invert(1) brightness(2);
        }

        .accordion-body { color: var(--text-secondary); }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }

        /* ===== Feature Card 3D ===== */
        .feature-card-3d { perspective: 800px; }

        .feature-card-inner {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            transition: transform 0.5s ease, box-shadow 0.5s ease, border-color 0.35s ease;
            transform-style: preserve-3d;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .feature-card-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(139, 92, 246, 0.12),
                transparent);
        }

        .feature-card-3d:hover .feature-card-inner {
            transform: translateY(-8px) rotateX(4deg);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.25),
                0 0 20px rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.15);
        }

        /* ===== Hero 3D Icon ===== */
        .hero-3d-icon {
            perspective: 600px;
            display: inline-block;
        }

        .hero-3d-icon i {
            display: inline-block;
            animation: gentleSpin 10s linear infinite;
            font-size: 8rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.2;
        }

        /* ===== Utility Overrides ===== */
        .text-muted { color: var(--text-muted) !important; }
        .small, small { color: var(--text-muted); }

        a { color: var(--accent-blue); transition: var(--transition-smooth); }
        a:hover { color: var(--accent-violet); }

        .text-primary { color: var(--accent-blue) !important; }
        .text-success { color: var(--accent-teal) !important; }
        .text-warning { color: var(--accent-amber) !important; }
        .text-danger { color: #ef6868 !important; }

        hr { border-color: var(--border-glass); }

        .section-title {
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glow-line {
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(99, 102, 241, 0.2),
                rgba(139, 92, 246, 0.15),
                transparent);
            border: none;
            margin: 2rem 0;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .note-card-3d:hover .note-card-inner {
                transform: translateY(-3px);
            }
            .bg-orb { display: none; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Ambient Background Orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    {% include 'components/navbar.html' %}

    <main class="py-4">
        <div class="container">
            {% include 'components/messages.html' %}
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include 'components/footer.html' %}

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 3D Card Tilt Effect -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.note-card-3d').forEach(card => {
                const inner = card.querySelector('.note-card-inner');
                if (!inner) return;

                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = (y - centerY) / centerY * -6;
                    const rotateY = (x - centerX) / centerX * 6;

                    inner.style.transform = `translateY(-6px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

                    const percentX = (x / rect.width) * 100;
                    const percentY = (y / rect.height) * 100;
                    inner.style.setProperty('--mouse-x', percentX + '%');
                    inner.style.setProperty('--mouse-y', percentY + '%');
                });

                card.addEventListener('mouseleave', () => {
                    inner.style.transform = '';
                    inner.style.removeProperty('--mouse-x');
                    inner.style.removeProperty('--mouse-y');
                });
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                observer.observe(el);
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
